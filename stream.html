<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream — Coming Soon | Mokopane FM 100.0 MHz</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #F5A800;
      --gold-lt: #FFC935;
      --black: #0A0A0A;
      --dark: #111111;
      --dark2: #1A1A1A;
      --white: #FFFFFF;
      --muted: #999999;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Soft ambient glow, echoes the hero treatment on the main site */
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 900px;
      height: 900px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(245,168,0,0.14) 0%, rgba(245,168,0,0) 65%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
    }

    .logo {
      height: 56px;
      width: auto;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 16px rgba(245, 168, 0, 0.4));
    }

    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      border-radius: 30px;
      background: rgba(245, 168, 0, 0.1);
      border: 1px solid rgba(245, 168, 0, 0.3);
      color: var(--gold);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .live-tag .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 84px);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    h1 em {
      font-style: normal;
      color: var(--gold);
    }

    p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto 36px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 30px;
      border-radius: 50px;
      background: var(--gold);
      color: var(--black);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow: 0 0 24px rgba(245, 168, 0, 0.3);
      transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
    }

    .back-link:hover {
      background: var(--gold-lt);
      box-shadow: 0 0 36px rgba(245, 168, 0, 0.55);
      transform: translateY(-2px);
    }

    .back-link svg { transition: transform 0.25s; }
    .back-link:hover svg { transform: translateX(-3px); }

    .freq {
      margin-top: 44px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 480px) {
      .logo { height: 46px; margin-bottom: 32px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="https://i.postimg.cc/L4brh0LL/lo.png" alt="Mokopane FM" />
    <span class="live-tag"><span class="dot"></span>Live Stream</span>
    <h1>Coming <em>Soon</em></h1>
    <p>We're putting the finishing touches on our online player. In the meantime, catch Mokopane FM live on 100.0 FM across Mogalakwena and the Waterberg region.</p>
    <a class="back-link" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 7L7 17M7 17H16M7 17V8"/></svg>
      Back to Home
    </a>
    <div class="freq">100.0 MHz — The Voice of Mogalakwena</div>
  </div>
</body>
</html>
