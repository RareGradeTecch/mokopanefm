<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokopane FM • 100.0 MHz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --yellow: #fab419;
            --maroon: #831622;
            --maroon-dark: #6b121c;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background-color: var(--yellow);
            color: var(--maroon);
        }
        
        .logo-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -2px;
        }

        .station-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--maroon);
            border-color: var(--maroon-dark);
            color: var(--yellow);
        }
        
        .station-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(131 22 34 / 0.3), 0 8px 10px -6px rgb(131 22 34 / 0.3);
            border-color: var(--yellow);
        }

        .station-card.active {
            border-color: var(--yellow);
            box-shadow: 0 0 0 3px rgba(250, 180, 25, 0.4);
        }

        .player-glow {
            box-shadow: 0 0 25px rgba(131, 22, 34, 0.15);
        }

        .station-frequency {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .modern-shadow {
            box-shadow: 0 10px 15px -3px rgb(131 22 34 / 0.2),
                        0 4px 6px -4px rgb(131 22 34 / 0.2);
        }

        .audio-visualizer {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .bar {
            width: 5px;
            background: linear-gradient(to top, var(--yellow), #fff);
            border-radius: 9999px;
            transition: height 0.1s ease;
        }

        /* Custom Scrollbar matching the theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--yellow);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--maroon);
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-[#fab419] text-[#831622]">
    <!-- Navbar -->
    <nav class="border-b border-[#831622]/20 bg-[#fab419] sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <!-- Logo -->
                    <div class="flex items-center gap-x-3">
                        <img src="https://i.postimg.cc/nL86cHLQ/logo.png" alt="Mokopane FM Logo" class="h-12 object-contain drop-shadow-md">
                    </div>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-md mx-8">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-3.5 text-[#fab419]"></i>
                        <input 
                            id="search-input"
                            type="text" 
                            placeholder="Search stations or genres..." 
                            class="w-full bg-[#831622] border border-[#6b121c] focus:border-[#fab419] transition-colors text-[#fab419] placeholder-[#fab419]/60 pl-11 py-3 rounded-3xl outline-none text-sm shadow-inner"
                        >
                    </div>
                </div>

                <div class="flex items-center gap-x-4">
                    <!-- Contact / Info -->
                    <div class="flex items-center gap-x-3">
                        <div class="text-right">
                            <div class="text-sm font-bold">015 491 1208</div>
                            <div class="text-xs font-semibold opacity-80">Studio Line</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-8">
        
        <!-- Header -->
        <div class="flex items-end justify-between mb-8">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter drop-shadow-sm">Live Radio</h1>
                <p class="font-medium mt-1 opacity-90">Listen live to Mokopane FM and more</p>
            </div>
            
            <div class="flex items-center gap-x-3">
                <button onclick="playRandomStation()" 
                        class="flex items-center gap-x-2 px-5 py-2.5 bg-[#831622] hover:bg-[#6b121c] border border-[#6b121c] rounded-3xl text-[#fab419] text-sm font-bold transition-colors shadow-md">
                    <i class="fa-solid fa-random mr-2"></i>
                    <span>Random Station</span>
                </button>
                
                <button onclick="stopRadio()" 
                        class="flex items-center gap-x-2 px-5 py-2.5 bg-[#831622] hover:bg-[#6b121c] border border-[#6b121c] rounded-3xl text-[#fab419] text-sm font-bold transition-colors shadow-md">
                    <i class="fa-solid fa-stop mr-2"></i>
                    <span>Stop</span>
                </button>
            </div>
        </div>

        <!-- Now Playing / Main Player -->
        <div class="bg-[#831622] border border-[#6b121c] rounded-3xl p-8 mb-8 modern-shadow text-[#fab419]">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Player Info -->
                <div class="flex-1">
                    <div class="flex items-center gap-x-3 mb-4">
                        <div class="px-3 py-1 bg-[#fab419]/20 border border-[#fab419]/30 rounded-2xl text-xs font-bold flex items-center gap-x-2">
                            <div class="w-2 h-2 bg-[#fab419] rounded-full animate-pulse"></div>
                            <span class="text-[#fab419]">ON AIR</span>
                        </div>
                        <span id="player-genre" class="text-sm font-medium opacity-80">—</span>
                    </div>
                    
                    <div id="player-station-name" 
                         class="text-4xl font-bold tracking-tighter mb-1 text-white">
                        Select a station
                    </div>
                    <div id="player-frequency" 
                         class="text-2xl font-bold opacity-90 station-frequency">
                        —
                    </div>
                    
                    <div id="player-location" class="text-sm font-medium opacity-70 mt-2 flex items-center gap-x-2">
                        <i class="fa-solid fa-globe"></i>
                        <span>—</span>
                    </div>
                </div>

                <!-- Audio Visualizer -->
                <div class="flex-1 flex items-center justify-center">
                    <div class="w-full max-w-[280px]">
                        <div class="audio-visualizer" id="visualizer">
                            <!-- Bars will be created by JS -->
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex flex-col justify-between min-w-[180px]">
                    <div class="flex items-center justify-end gap-x-3">
                        <button onclick="togglePlay()" 
                                class="w-14 h-14 flex items-center justify-center bg-[#fab419] text-[#831622] rounded-2xl hover:bg-white transition-all shadow-lg border border-[#fab419]"
                                id="play-button">
                            <i class="fa-solid fa-play text-2xl ml-0.5" id="play-icon"></i>
                        </button>
                    </div>
                    
                    <!-- Volume -->
                    <div class="mt-6">
                        <div class="flex items-center justify-between text-xs font-bold mb-1.5 px-1">
                            <span class="opacity-80">Volume</span>
                            <span id="volume-value" class="text-white">80</span>
                        </div>
                        <div class="flex items-center gap-x-3">
                            <i class="fa-solid fa-volume-low opacity-80"></i>
                            <input type="range" 
                                   id="volume-slider"
                                   min="0" max="100" value="80"
                                   class="w-full accent-[#fab419] cursor-pointer">
                            <i class="fa-solid fa-volume-high opacity-80"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">Stations</h2>
                <div class="text-sm font-bold opacity-80" id="station-count">24 stations</div>
            </div>
            
            <!-- Genre Filters -->
            <div class="flex flex-wrap gap-2" id="genre-filters">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Stations Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4 pb-12" id="stations-grid">
            <!-- Stations populated by JavaScript -->
        </div>
        
    </div>

    <!-- Audio Element -->
    <audio id="audio-player" class="hidden"></audio>

    <script>
        // Radio Stations Data
        const stations = [
            {
                id: 1,
                name: "Mokopane FM",
                frequency: "100.0",
                genre: "Community",
                location: "Mokopane, SA",
                stream: "https://ice1.somafm.com/groovesalad-320-mp3", // Demo stream kept for functionality
                color: "#fab419"
            },
            {
                id: 2,
                name: "Secret Agent",
                frequency: "89.3",
                genre: "Lounge",
                location: "San Francisco",
                stream: "https://ice1.somafm.com/secretagent-320-mp3",
                color: "#fab419"
            },
            {
                id: 3,
                name: "Indie Pop Rocks",
                frequency: "94.7",
                genre: "Indie",
                location: "San Francisco",
                stream: "https://ice1.somafm.com/indiepop-320-mp3",
                color: "#fab419"
            },
            {
                id: 4,
                name: "Lush",
                frequency: "105.2",
                genre: "Ambient",
                location: "San Francisco",
                stream: "https://ice1.somafm.com/lush-320-mp3",
                color: "#fab419"
            },
            {
                id: 5,
                name: "DEF CON Radio",
                frequency: "88.1",
                genre: "Electronic",
                location: "Las Vegas",
                stream: "https://ice1.somafm.com/defcon-320-mp3",
                color: "#fab419"
            },
            {
                id: 6,
                name: "Space Station Soma",
                frequency: "98.6",
                genre: "Ambient",
                location: "International Space Station",
                stream: "https://ice1.somafm.com/spacestation-320-mp3",
                color: "#fab419"
            },
            {
                id: 7,
                name: "Boot Liquor",
                frequency: "92.4",
                genre: "Country",
                location: "San Francisco",
                stream: "https://ice1.somafm.com/bootliquor-320-mp3",
                color: "#fab419"
            },
            {
                id: 8,
                name: "Deep Space One",
                frequency: "78.9",
                genre: "Ambient",
                location: "San Francisco",
                stream: "https://ice1.somafm.com/deepspaceone-320-mp3",
                color: "#fab419"
            },
            {
                id: 9,
                name: "NTS Radio",
                frequency: "102.7",
                genre: "Electronic",
                location: "London",
                stream: "https://stream-relay-geo.ntslive.net/stream",
                color: "#fab419"
            },
            {
                id: 10,
                name: "Chillhop Music",
                frequency: "96.3",
                genre: "Lo-fi",
                location: "Amsterdam",
                stream: "https://stream-44.zeno.fm/0r0xa792kwzuv",
                color: "#fab419"
            },
            {
                id: 11,
                name: "KEXP",
                frequency: "90.3",
                genre: "Alternative",
                location: "Seattle",
                stream: "https://kexp-mp3-128.streamguys1.com/kexp128.mp3",
                color: "#fab419"
            },
            {
                id: 12,
                name: "Jazz24",
                frequency: "88.5",
                genre: "Jazz",
                location: "Seattle",
                stream: "https://live.amperwave.net/direct/ppm-jazz24mp3-ibc1",
                color: "#fab419"
            }
        ];

        let currentStation = null;
        let isPlaying = false;
        let audio = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;

        // Initialize Audio
        function initAudio() {
            audio = document.getElementById('audio-player');
            
            // Volume control
            const volumeSlider = document.getElementById('volume-slider');
            const volumeValue = document.getElementById('volume-value');
            
            volumeSlider.addEventListener('input', () => {
                audio.volume = volumeSlider.value / 100;
                volumeValue.textContent = volumeSlider.value;
            });

            // Audio event listeners
            audio.addEventListener('playing', () => {
                isPlaying = true;
                updatePlayButton();
                startVisualizer();
            });

            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayButton();
                stopVisualizer();
            });

            audio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayButton();
                stopVisualizer();
            });

            audio.addEventListener('error', (e) => {
                console.error("Audio error:", e);
                alert("Unable to play this station. The stream might be temporarily unavailable.");
                stopRadio();
            });
        }

        // Render Stations Grid
        function renderStations(filteredStations = stations) {
            const grid = document.getElementById('stations-grid');
            grid.innerHTML = '';

            filteredStations.forEach(station => {
                const isActive = currentStation && currentStation.id === station.id;
                
                const cardHTML = `
                    <div onclick="playStation(${station.id})" 
                         class="station-card rounded-3xl p-5 cursor-pointer shadow-md ${isActive ? 'active border-[#fab419]' : 'border-[#6b121c]'}">
                        
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-x-3">
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-[#fab419] text-[#831622] shadow-sm">
                                    <i class="fa-solid fa-broadcast-tower text-xl"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-lg leading-none">${station.name}</div>
                                    <div class="text-sm font-semibold opacity-80 station-frequency mt-1">${station.frequency} FM</div>
                                </div>
                            </div>
                            
                            ${isActive ? `
                                <div class="flex items-center">
                                    <div class="px-2.5 py-1 bg-[#fab419]/20 text-[#fab419] text-xs font-bold rounded-2xl flex items-center gap-x-1 border border-[#fab419]/30">
                                        <div class="w-1.5 h-1.5 bg-[#fab419] rounded-full animate-pulse"></div>
                                        <span class="text-[10px]">ON AIR</span>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="inline-block px-3 py-1 text-xs font-bold rounded-2xl bg-[#6b121c] text-[#fab419]">
                                    ${station.genre}
                                </span>
                            </div>
                            <div class="text-xs font-medium opacity-70">
                                ${station.location}
                            </div>
                        </div>
                    </div>
                `;
                
                grid.innerHTML += cardHTML;
            });
        }

        // Render Genre Filters
        function renderGenreFilters() {
            const container = document.getElementById('genre-filters');
            const genres = [...new Set(stations.map(s => s.genre))];
            
            container.innerHTML = `
                <button onclick="filterByGenre('all')" 
                        class="px-4 py-1.5 text-sm rounded-3xl bg-[#831622] text-[#fab419] hover:bg-[#6b121c] border border-[#831622] transition-colors font-bold shadow-sm">
                    All
                </button>
            `;
            
            genres.forEach(genre => {
                const button = document.createElement('button');
                button.className = `px-4 py-1.5 text-sm rounded-3xl bg-transparent text-[#831622] hover:bg-[#831622] hover:text-[#fab419] border border-[#831622] transition-colors font-bold`;
                button.textContent = genre;
                button.onclick = () => filterByGenre(genre);
                container.appendChild(button);
            });
        }

        // Filter stations by genre
        function filterByGenre(genre) {
            const grid = document.getElementById('stations-grid');
            let filtered = stations;
            
            if (genre !== 'all') {
                filtered = stations.filter(station => station.genre === genre);
            }
            
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(station => 
                    station.name.toLowerCase().includes(searchTerm) ||
                    station.genre.toLowerCase().includes(searchTerm) ||
                    station.location.toLowerCase().includes(searchTerm)
                );
            }
            
            renderStations(filtered);
        }

        // Search functionality
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase().trim();
                
                let filtered = stations;
                
                if (term) {
                    filtered = stations.filter(station => 
                        station.name.toLowerCase().includes(term) ||
                        station.genre.toLowerCase().includes(term) ||
                        station.location.toLowerCase().includes(term)
                    );
                }
                
                renderStations(filtered);
            });
        }

        // Play a station
        function playStation(stationId) {
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            if (audio && !audio.paused) {
                audio.pause();
            }

            currentStation = station;

            // Update main player UI
            document.getElementById('player-station-name').textContent = station.name;
            document.getElementById('player-frequency').textContent = `${station.frequency} FM`;
            document.getElementById('player-genre').textContent = station.genre;
            document.getElementById('player-location').innerHTML = `
                <i class="fa-solid fa-globe mr-1.5"></i>
                <span>${station.location}</span>
            `;

            audio.src = station.stream;
            audio.volume = document.getElementById('volume-slider').value / 100;

            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButton();
                    updateActiveStation();
                }).catch(error => {
                    console.error("Playback failed:", error);
                    alert("Playback failed. This might be due to browser restrictions or stream issues.");
                    isPlaying = false;
                    updatePlayButton();
                });
            }

            updateActiveStation();
        }

        // Update active station in grid
        function updateActiveStation() {
            const cards = document.querySelectorAll('.station-card');
            
            cards.forEach(card => {
                card.classList.remove('active', 'border-[#fab419]');
                card.classList.add('border-[#6b121c]');
                
                const stationName = card.querySelector('.font-bold').textContent;
                if (currentStation && stationName === currentStation.name) {
                    card.classList.add('active', 'border-[#fab419]');
                    card.classList.remove('border-[#6b121c]');
                }
            });
        }

        // Toggle play/pause
        function togglePlay() {
            if (!currentStation) {
                playStation(stations[0].id);
                return;
            }

            if (audio.paused) {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButton();
                }).catch(err => {
                    console.error(err);
                });
            } else {
                audio.pause();
                isPlaying = false;
                updatePlayButton();
            }
        }

        // Update play button icon
        function updatePlayButton() {
            const playIcon = document.getElementById('play-icon');
            
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
            }
        }

        // Stop radio
        function stopRadio() {
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
            isPlaying = false;
            updatePlayButton();
            stopVisualizer();
            
            document.getElementById('player-station-name').textContent = "Select a station";
            document.getElementById('player-frequency').textContent = "—";
            document.getElementById('player-genre').textContent = "—";
            document.getElementById('player-location').innerHTML = `<i class="fa-solid fa-globe"></i> <span>—</span>`;
            
            document.querySelectorAll('.station-card').forEach(card => {
                card.classList.remove('active', 'border-[#fab419]');
                card.classList.add('border-[#6b121c]');
            });
            
            currentStation = null;
        }

        // Play random station
        function playRandomStation() {
            const randomIndex = Math.floor(Math.random() * stations.length);
            playStation(stations[randomIndex].id);
        }

        // Audio Visualizer
        function setupVisualizer() {
            const visualizerContainer = document.getElementById('visualizer');
            visualizerContainer.innerHTML = '';
            
            for (let i = 0; i < 12; i++) {
                const bar = document.createElement('div');
                bar.className = `bar w-[5px] bg-[#fab419] rounded-full`;
                bar.style.height = `${Math.random() * 20 + 8}px`;
                visualizerContainer.appendChild(bar);
            }
        }

        function startVisualizer() {
            const visualizerContainer = document.getElementById('visualizer');
            const bars = visualizerContainer.children;
            
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 64;
                    
                    const source = audioContext.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                } catch (e) {
                    console.log("Visualizer not supported");
                    return;
                }
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function animate() {
                if (!isPlaying || !analyser) {
                    stopVisualizer();
                    return;
                }
                
                analyser.getByteFrequencyData(dataArray);
                
                for (let i = 0; i < bars.length; i++) {
                    const bar = bars[i];
                    const index = Math.floor(i * (bufferLength / bars.length));
                    const value = dataArray[index];
                    
                    const height = Math.max(8, (value / 255) * 55);
                    bar.style.height = `${height}px`;
                    
                    if (Math.random() > 0.8) {
                        bar.style.opacity = 0.7 + Math.random() * 0.3;
                    }
                }
                
                animationFrame = requestAnimationFrame(animate);
            }
            
            animate();
        }

        function stopVisualizer() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            
            const visualizerContainer = document.getElementById('visualizer');
            const bars = visualizerContainer.children;
            
            for (let i = 0; i < bars.length; i++) {
                bars[i].style.height = `${Math.random() * 20 + 8}px`;
                bars[i].style.opacity = '1';
            }
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    togglePlay();
                }
                
                if (e.key.toLowerCase() === 'r') {
                    playRandomStation();
                }
                
                if (e.key === 'Escape') {
                    stopRadio();
                }
            });
        }

        function updateStationCount() {
            document.getElementById('station-count').textContent = `${stations.length} stations`;
        }

        function initializeRadio() {
            initAudio();
            renderStations();
            renderGenreFilters();
            setupSearch();
            setupVisualizer();
            setupKeyboardShortcuts();
            updateStationCount();
            
            document.getElementById('volume-value').textContent = '80';
            
            setTimeout(() => {
                const firstCard = document.querySelector('.station-card');
                if (firstCard) {
                    firstCard.style.transition = 'all 0.3s ease';
                }
            }, 500);

            console.log('%c[Mokopane FM] Website initialized successfully', 'color: #fab419');
        }

        window.onload = initializeRadio;
    </script>
</body>
</html>
